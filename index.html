<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Final (Original GPS)</title>

<style>
/* ===== CSS OSTANE NESPREMENJEN ===== */
body{margin:0;background:#0b0f14;color:#eaf2ff;font-family:system-ui,Arial;user-select:none;}
.card{background:#121a23;border:1px solid #203043;border-radius:12px;padding:12px;margin:10px;}
.big{font-size:2.4rem;font-weight:800;font-family:ui-monospace,monospace;}
.bigTotal{font-size:3.6rem;}
.label{color:#a3b8d4;font-size:.9rem;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
button,input{background:#0f1620;color:#eaf2ff;border:1px solid #2c3c50;padding:10px 12px;border-radius:10px;}
button{cursor:pointer;}
.primary{background:#143247;}
.bigCorr{font-size:1.6rem;padding:18px 30px;}
button.active{background:#1d5a2b;border-color:#2e7d3d;}
button.warn{background:#5a1d1d;border-color:#7d2e2e;}
button.info{background:#1d3e5a;border-color:#2e5c7d;}
.leadBtn.active{background:#1d5a2b;border-color:#2e7d3d;}
.log{max-height:320px;overflow:auto;border:1px dashed #34465e;background:#0f1620;padding:8px;border-radius:10px;font-family:ui-monospace,monospace;font-size:.85rem;white-space:pre-wrap;}
.alert{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:#0c1a25;border:2px solid #ffd166;border-radius:14px;padding:12px;display:none;z-index:9999;}
</style>
</head>

<body>

<!-- ===== HTML OSTANE NESPREMENJEN (izpuščen za krajši prikaz) ===== -->

<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="log"></div>
</div>

<script>
/* ===== VSA TVOJA KODA OSTANE ENAKA ===== */
/* ===== EDINA SPREMEMBA: renderAlerts() ===== */

function renderAlerts(){
  const box = $('alertList');
  box.textContent = '';

  wps.forEach((w,i)=>{
    if(w.passed) return;

    const d = Math.round(w.km*1000 - total);

    const row = document.createElement('div');
    row.style.display = 'flex';
    row.style.alignItems = 'center';
    row.style.justifyContent = 'space-between';
    row.style.gap = '8px';

    row.innerHTML = `
      <span>${d} m – ${w.txt}</span>
      <span>
        <button class="edit" data-i="${i}">✏️</button>
        <button class="del" data-i="${i}">🗑</button>
      </span>
    `;

    box.appendChild(row);
  });

  box.querySelectorAll('.del').forEach(b=>{
    b.onclick=()=>{
      wps.splice(b.dataset.i,1);
      renderAlerts();
      updateNext();
    };
  });

  box.querySelectorAll('.edit').forEach(b=>{
    b.onclick=()=>{
      const w = wps[b.dataset.i];

      const newTxt = prompt('Opis opozorila:', w.txt);
      if(newTxt === null) return;

      const newDist = prompt('Razdalja od starta (m):', Math.round(w.km*1000));
      if(newDist === null || isNaN(newDist) || newDist<=0) return;

      w.txt = newTxt;
      w.km = Number(newDist)/1000;
      w.pre = w.alert = w.passed = false;

      wps.sort((a,b)=>a.km-b.km);
      renderAlerts();
      updateNext();
    };
  });
}
</script>
</body>
</html>
