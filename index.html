<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Final (Original GPS)</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.bigTotal{ font-size:3.6rem; }

.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
}
button{ cursor:pointer; }

.primary{ background:#143247; }
.bigCorr{ font-size:1.6rem; padding:18px 30px; }

button.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}
button.warn{
  background:#5a1d1d;
  border-color:#7d2e2e;
}
button.info{
  background:#1d3e5a;
  border-color:#2e5c7d;
}

.leadBtn.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}

.log{
  max-height:320px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
  white-space:pre-wrap;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- ======= (HTML del je 100 % NESPREMENJEN) ======= -->

<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big bigTotal">0.000</div>

  <div class="row">
    <button id="tm" class="bigCorr">−10 m</button>
    <button id="tp" class="bigCorr">+10 m</button>
    <button id="resetTotal" class="warn">⟲ RESET</button>
  </div>

  <div class="label">GPS status:</div><div id="gpss">Čakam GPS fix…</div>
  <div class="label">Natančnost:</div><div id="acca">—</div>
  <div class="label">Koordinate:</div><div id="coords">—</div>
</div>

<div class="card">
  <div class="label">Naslednje opozorilo</div>
  <div id="nextD" class="big">— m</div>
</div>

<div class="card">
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<div class="card">
  <div class="label">Dodaj opozorilo (ABSOLUTNA razdalja)</div>
  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Razdalja od starta (m)" style="width:160px">
    <input id="alertTxt" type="text" placeholder="Besedilo" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Predopozorilo:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary">➕ DODAJ</button>
  </div>
</div>

<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="log"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between">
    <div class="label">Log</div>
    <label>
      <input id="logToggle" type="checkbox" checked> Log ON
    </label>
  </div>
  <div id="log" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
/* ======= VSA TVOJA JS KODA OSTANE ENAKA ======= */
/* ======= EDINA SPREMEMBA: renderAlerts() ======= */

function renderAlerts(){   // <<< EDINA SPREMEMBA
  const box = $('alertList');
  box.textContent = '';

  wps.forEach((w,i)=>{
    if(w.passed) return;

    const d = Math.round(w.km*1000 - total);

    const row = document.createElement('div');
    row.style.display = 'flex';
    row.style.alignItems = 'center';
    row.style.justifyContent = 'space-between';
    row.style.gap = '8px';

    row.innerHTML = `
      <span>${d} m – ${w.txt}</span>
      <span>
        <button data-i="${i}" class="edit">✏️</button>
        <button data-i="${i}" class="del">🗑</button>
      </span>
    `;

    box.appendChild(row);
  });

  box.querySelectorAll('.del').forEach(b=>{
    b.onclick=()=>{
      wps.splice(b.dataset.i,1);
      renderAlerts();
      updateNext();
    };
  });

  box.querySelectorAll('.edit').forEach(b=>{
    b.onclick=()=>{
      const w=wps[b.dataset.i];
      const n=prompt('Nov opis',w.txt);
      if(n!==null){ w.txt=n; renderAlerts(); }
    };
  });
}
</script>
</body>
</html>
``
