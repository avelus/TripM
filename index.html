<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TripM – Roadbook Trip Alerts</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  -webkit-user-select:none;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.35rem;
  font-weight:700;
  font-family:monospace;
}
.label{
  color:#a3b8d4;
  font-size:.9rem;
}
.row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  align-items:center;
}
button, input, select{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:8px 12px;
  border-radius:10px;
  font-size:1rem;
}
button{ cursor:pointer; }
.primary{
  background:#143247;
  border-color:#255a79;
}
.ok{
  background:#0f2b22;
  border-color:#1c5b45;
}
.danger{
  background:#3a1618;
  border-color:#6b2226;
}
.list{
  max-height:220px;
  overflow:auto;
  border:1px dashed #203043;
  padding:8px;
  border-radius:10px;
}
.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:350px;
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:10px;
  display:none;
  z-index:9999;
  text-align:center;
}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big">0.000</div>
  <div class="row">
    <button id="tm">−0.010</button>
    <button id="tp">+0.010</button>
    <input id="setT" type="number" step="0.001" placeholder="12.345">
    <button id="setTb" class="ok">Nastavi</button>
    <button id="rT" class="danger">Reset TOTAL</button>
  </div>
  <div class="label" id="gpss">GPS inicializacija…</div>
  <div class="label" id="acca">Natančnost: —</div>
</div>

<!-- PARTIAL -->
<div class="card">
  <div class="label">PARTIAL (km)</div>
  <div id="partial" class="big">0.000</div>
  <div class="row">
    <button id="pm">−0.010</button>
    <button id="pp">+0.010</button>
    <button id="rP" class="ok">Reset PARTIAL</button>
  </div>
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
  </div>
</div>

<!-- NEXT POINT -->
<div class="card">
  <div class="label">Naslednja točka</div>
  <div id="nextD" class="big" style="font-size:1.8rem">— m</div>
  <div id="nextL" class="label">Ni naloženih točk.</div>
</div>

<!-- CSV LOADING -->
<div class="card">
  <div class="label">CSV datoteke (root)</div>
  <div class="row">
    <select id="csvSel"></select>
    <button id="loadSel" class="primary">Naloži</button>
  </div>
  <div class="row">
    <input id="urlIn" type="url" placeholder="https://…/waypoints.csv" style="flex:1">
    <button id="loadUrl">URL load</button>
  </div>
</div>

<!-- ALERT SETTINGS -->
<div class="card">
  <div class="label">Opozorila</div>
  <div class="row">
    <label>Lead (m):</label><input id="lead" type="number" value="50" min="0" step="5" style="width:80px">
    <label>MaxAcc (m):</label><input id="maxAcc" type="number" value="30" min="5" style="width:80px">
    <label>MinStep (m):</label><input id="minStep" type="number" value="2" min="0" style="width:80px">
  </div>
</div>

<!-- WAYPOINT LIST -->
<div class="card">
  <div class="label">Točke</div>
  <div id="wpList" class="list"></div>
  <div class="row">
    <input id="qTxt" type="text" placeholder="Opis" style="flex:1">
    <button id="addHere" class="primary">Dodaj @TOTAL</button>
    <button id="clr" class="danger">Počisti</button>
    <button id="exp" class="ok">Izvozi CSV</button>
  </div>
</div>

<!-- ALERT POPUP -->
<div id="alert" class="alert">
  <div id="amsg">Opozorilo</div>
</div>


<script>
// ---------------------------
// GLOBALS
// ---------------------------
let watchId=null,last=null,total=0,partial=0,measure=false;
let leadM=50, maxA=30, minS=2;
let wps=[], autoHide=8000;
let USER="avelus", REPO="TripM";

// SHORTHAND
const $ = id => document.getElementById(id);

// ---------------------------
// FORMATTING & MATH
// ---------------------------
function fmt(x){ return (x/1000).toFixed(3); }

function hav(a,b){
  const R=6371000, toRad=d=>d*Math.PI/180;
  let dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
  let h=Math.sin(dLat/2)**2 +
         Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

// ---------------------------
// UPDATE UI
// ---------------------------
function update(){
  $('total').textContent = fmt(total);
  $('partial').textContent = fmt(partial);
  nextWp();
}

function nextWp(){
  if(!wps.length){
    $('nextD').textContent='— m';
    $('nextL').textContent='Ni točk';
    return;
  }

  let bestDist=Infinity, label='';
  for(let w of wps){
    let d = w.km*1000 - total;
    if(d>0 && d<bestDist){
      bestDist=d;
      label = `#${w.id} @ ${w.km.toFixed(3)} km — ${w.txt}`;
    }
  }

  if(bestDist===Infinity){
    $('nextD').textContent='— m';
    $('nextL').textContent='Ni več točk';
    return;
  }

  $('nextD').textContent = Math.round(bestDist)+" m";
  $('nextL').textContent = label;
}

// ---------------------------
// ALERT BOX
// ---------------------------
function showAlert(msg){
  $('amsg').textContent = msg;
  let a = $('alert');
  a.style.display='block';
  setTimeout(()=>a.style.display='none', autoHide);
}

// ---------------------------
// CSV LOADING
// ---------------------------
async function loadCsv(url){
  let txt = await fetch(url).then(r=>r.text());
  localStorage.csv_url = url;
  localStorage.lastCsv = txt;

  let rows = txt.split(/\r?\n/).filter(l=>l.trim());
  let head = rows[0].toLowerCase();
  let delim = head.includes(';') ? ';' : ',';
  let cols = head.split(delim);

  let iId  = cols.indexOf('id');
  let iKm  = cols.indexOf('distance_km');
  let iTxt = cols.indexOf('text');

  wps = [];

  for(let i=1;i<rows.length;i++){
    let a = rows[i].split(delim);
    if(!a.length) continue;

    let id = iId>=0 ? a[iId] : i;
    let km = iKm>=0 ? parseFloat(a[iKm].replace(',','.')) : NaN;
    let tx = iTxt>=0 ? a[iTxt] : "";

    if(!isNaN(km)){
      wps.push({id:id, km:km, txt:tx});
    }
  }

  wps.sort((a,b)=>a.km-b.km);
  render();
}

function render(){
  let H='';
  for(let w of wps){
    H += `<div>${w.id} — ${w.km.toFixed(3)} km — ${w.txt}</div>`;
  }
  $('wpList').innerHTML = H;
  nextWp();
}

// ---------------------------
// GPS INITIALIZATION (ON LOAD)
// ---------------------------
function gpsInit(){
  if(!navigator.geolocation){
    $('gpss').textContent='Ni GPS podpore';
    return;
  }

  watchId = navigator.geolocation.watchPosition(pos=>{
    let acc = pos.coords.accuracy;
    $('acca').textContent = "Natančnost: " + Math.round(acc) + " m";

    let now = {lat:pos.coords.latitude, lon:pos.coords.longitude};

    if(acc <= maxA){
      if(last){
        let d = hav(last,now);
        if(measure && d >= minS){
          total += d;
          partial += d;
          update();
          checkWP();
        }
      }
      last = now;
    }

  }, err=>{
    $('gpss').textContent="GPS napaka";
  }, {enableHighAccuracy:true, maximumAge:0, timeout:5000});

  $('gpss').textContent = "GPS aktiviran";
}

// ---------------------------
// WAYPOINT ALERTS
// ---------------------------
function checkWP(){
  for(let w of wps){
    let d = w.km*1000 - total;
    if(d > 0 && d <= leadM){
      showAlert(w.txt || ("Točka " + w.id));
      // mark as fired:
      w.km = Infinity;
      break;
    }
  }
}

// ---------------------------
// CSV DISCOVERY (GitHub repo root)
// ---------------------------
async function discoverCsv(){
  let api = `https://api.github.com/repos/${USER}/${REPO}/contents/`;

  let resp = await fetch(api).then(r=>r.json()).catch(_=>[]);
  let csvs = resp.filter(f=>f.name && f.name.endsWith(".csv")).map(f=>f.name);

  if(!csvs.length){
    $('csvSel').innerHTML = '<option>(Ni .csv datotek)</option>';
    return;
  }

  $('csvSel').innerHTML =
    csvs.map(n => `<option value="${location.origin + location.pathname.replace('index.html','') + n}">${n}</option>`).join('');

  // Auto-load if only 1 CSV:
  if(csvs.length===1){
    let url = location.origin + location.pathname.replace('index.html','') + csvs[0];
    await loadCsv(url);
  }
}

// ---------------------------
// ON LOAD
// ---------------------------
window.onload = async ()=>{

  gpsInit();        // GPS tracking takoj, še pred START
  discoverCsv();    // odkrij CSV v root-u

  // če obstaja prej uporabljeni CSV in še nismo nič naložili
  let lc = localStorage.csv_url;
  if(lc && !wps.length){
    await loadCsv(lc);
  }
};

// ---------------------------
// BUTTONS
// ---------------------------
$('startBtn').onclick = ()=>{ measure=true; partial=0; update(); };
$('stopBtn').onclick  = ()=>{ measure=false; };

$('rT').onclick = ()=>{ total=0; partial=0; update(); };
$('rP').onclick = ()=>{ partial=0; update(); };

$('tm').onclick = ()=>{ total=Math.max(0,total-10); update(); };
$('tp').onclick = ()=>{ total+=10; update(); };

$('pm').onclick = ()=>{ partial=Math.max(0,partial-10); update(); };
$('pp').onclick = ()=>{ partial+=10; update(); };

$('setTb').onclick = ()=>{
  let v = parseFloat($('setT').value.replace(',','.'));
  if(!isNaN(v)){ total=v*1000; update(); }
};

$('lead').onchange   = e=> leadM = parseFloat(e.target.value)||50;
$('maxAcc').onchange = e=> maxA = parseFloat(e.target.value)||30;
$('minStep').onchange= e=> minS = parseFloat(e.target
