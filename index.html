<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Manual Alerts FINAL</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}

/* ✅ +50 % za TOTAL */
.bigTotal{
  font-size:3.6rem; /* ~50 % več */
}

.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
  font-size:1rem;
}
button{ cursor:pointer; }

.primary{ background:#143247; border-color:#255a79; }

.bigCorr{
  font-size:1.6rem;
  padding:18px 30px;
}

.bigAdd{
  font-size:1.4rem;
  padding:16px 28px;
}

.leadBtn.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}

#startBtn.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}
#stopBtn.active{
  background:#7a2222;
  border-color:#a23a3a;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
}

.list{
  max-height:220px;
  overflow:auto;
  border:1px dashed #203043;
  padding:8px;
  border-radius:10px;
}

.log{
  max-height:160px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big bigTotal">0.000</div>

  <div class="row">
    <button id="tm" class="bigCorr">−10 m</button>
    <button id="tp" class="bigCorr">+10 m</button>
  </div>

  <div id="gpss" class="label">Inicializiram GPS…</div>
</div>

<!-- NEXT ALERT -->
<div class="card">
  <div class="label">Naslednje opozorilo</div>
  <div id="nextD" class="big">— m</div>
</div>

<!-- CONTROL -->
<div class="card">
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<!-- ADD ALERT -->
<div class="card">
  <div class="label">Dodaj opozorilo</div>

  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Čez (m)" style="width:120px">
    <input id="alertTxt" type="text" placeholder="Besedilo opozorila" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Predopozorilo:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ OPOZORILO</button>
  </div>
</div>

<!-- ACTIVE ALERTS -->
<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="list"></div>
</div>

<!-- LOG -->
<div class="card">
  <div class="label">Log (zadnjih 20)</div>
  <div id="log" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
/* ===== GLOBALS ===== */
let total=0,last=null,measure=false;
let minStep=0.3,maxAcc=30;
let leadM=200;
let wps=[];
let wakeLock=null;
const LOG_MAX=20;

const $=id=>document.getElementById(id);
const fmt=m=>(m/1000).toFixed(3);

/* ===== LOG ===== */
function log(msg){
  const box=$('log');
  const lines=box.textContent.split('\n').filter(l=>l);
  lines.push(msg);
  while(lines.length>LOG_MAX) lines.shift();
  box.textContent=lines.join('\n');
  box.scrollTop=box.scrollHeight;
}

/* ===== NEXT ALERT ===== */
function updateNext(){
  let best=Infinity;
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;
    if(d>0 && d<best) best=d;
  }
  $('nextD').textContent = best<Infinity ? Math.round(best)+' m' : '— m';
}

/* ===== ALERT LOGIC ===== */
function checkAlerts(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;

    if(!w.pre && d<=w.lead && d>0){
      w.pre=true;
      log('PRE: '+w.txt);
    }
    if(!w.alert && d<=0){
      w.alert=true; w.passed=true;
      navigator.vibrate?.(250);
      showAlert(w.txt);
      log('ALERT: '+w.txt);
    }
  }
  renderAlerts();
  updateNext();
}

/* ===== UI ===== */
function showAlert(t){
  $('amsg').textContent=t;
  $('alert').style.display='block';
  clearTimeout(showAlert.t);
  showAlert.t=setTimeout(()=>$('alert').style.display='none',6000);
}

/* ===== ALERT LIST ===== */
function renderAlerts(){
  const box=$('alertList');
  if(!wps.length){
    box.innerHTML='<div style="opacity:.6">Ni opozoril</div>';
    return;
  }
  box.innerHTML=wps.map((w,i)=>{
    const d=Math.round(w.km*1000-total);
    const s=w.passed?'✅':(w.pre?'⚠️':'⏳');
    return `
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <div>
          ${s} ${w.txt}<br>
          <span style="opacity:.6">${d>0?d+' m':'—'} | lead ${w.lead} m</span>
        </div>
        <div>
          <button onclick="editAlert(${i})">✏️</button>
          <button onclick="delAlert(${i})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

function delAlert(i){
  wps.splice(i,1);
  renderAlerts();
  updateNext();
}

function editAlert(i){
  const w=wps[i];
  const nd=prompt('Razdalja sprožitve (m od zdaj):', Math.round(w.km*1000-total));
  if(nd===null) return;
  const nt=prompt('Besedilo:', w.txt);
  if(nt===null) return;
  const nl=prompt('Predopozorilo (m):', w.lead);
  if(nl===null) return;

  w.km=(total+Number(nd))/1000;
  w.txt=nt;
  w.lead=Number(nl)||w.lead;
  w.pre=w.alert=w.passed=false;

  renderAlerts();
  updateNext();
}

/* ===== GPS INIT ===== */
if('geolocation'in navigator){
  navigator.geolocation.watchPosition(p=>{
    const acc=p.coords.accuracy;
    $('gpss').textContent=`GPS OK (${Math.round(acc)} m)`;
    if(acc>maxAcc) return;

    const now={lat:p.coords.latitude,lon:p.coords.longitude};
    if(last){
      const R=6371000,rad=x=>x*Math.PI/180;
      const d=Math.acos(
        Math.sin(rad(last.lat))*Math.sin(rad(now.lat))+
        Math.cos(rad(last.lat))*Math.cos(rad(now.lat))*
        Math.cos(rad(now.lon-last.lon))
      )*R;

      if(measure && d>=minStep){
        total+=d;
        $('total').textContent=fmt(total);
        checkAlerts();
      }
    }
    last=now;
  },()=>{}, {enableHighAccuracy:true});
}

/* ===== BUTTONS ===== */
$('startBtn').onclick=()=>{
  measure=true;
  $('startBtn').classList.add('active');
  $('stopBtn').classList.remove('active');
  log('START');
};
$('stopBtn').onclick=()=>{
  measure=false;
  $('stopBtn').classList.add('active');
  $('startBtn').classList.remove('active');
  log('STOP');
};

/* TOTAL correction */
$('tm').onclick=()=>{
  total=Math.max(0,total-10);
  $('total').textContent=fmt(total);
  updateNext();
};
$('tp').onclick=()=>{
  total+=10;
  $('total').textContent=fmt(total);
  updateNext();
};

/* Lead select */
document.querySelectorAll('.leadBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.leadBtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    leadM=Number(b.dataset.m);
  };
});

/* Add alert */
$('addAlert').onclick=()=>{
  const d=Number($('alertDist').value);
  if(!d||d<=0){ showAlert('Vnesi razdaljo'); return; }
  const txt=$('alertTxt').value.trim()||'Opozorilo';

  wps.push({
    km:(total+d)/1000,
    txt,
    lead:leadM,
    pre:false, alert:false, passed:false
  });

  $('alertDist').value='';
  $('alertTxt').value='';
  renderAlerts();
  updateNext();
  log(`ADD: ${txt} (+${d}m, lead ${leadM}m)`);
};

/* Wake‑Lock */
$('btnWake').onclick=async()=>{
  try{
    if(!wakeLock){
      wakeLock=await navigator.wakeLock.request('screen');
      $('btnWake').textContent='🔒 Wake‑Lock ON';
      log('Wake‑Lock ON');
    }else{
      await wakeLock.release();
      wakeLock=null;
      $('btnWake').textContent='🔆 Wake‑Lock';
      log('Wake‑Lock OFF');
    }
  }catch(e){
    log('Wake‑Lock ERR');
  }
};

renderAlerts(); updateNext();
</script>
</body>
</html>
