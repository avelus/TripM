<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Stable Manual Alerts</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
  font-size:1rem;
}
button{ cursor:pointer; }

.primary{ background:#143247; border-color:#255a79; }
.bigAdd{ font-size:1.4rem; padding:16px 28px; }

.list{
  max-height:220px;
  overflow:auto;
  border:1px dashed #203043;
  padding:8px;
  border-radius:10px;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
  text-align:center;
}

.log{
  max-height:160px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
}

#startBtn,#stopBtn{font-size:1.6rem;padding:18px 26px;}
#startBtn.active{background:#1d5a2b;}
#stopBtn.active{background:#7a2222;}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big">0.000</div>
  <div id="gpss" class="label">Inicializiram GPS…</div>
</div>

<!-- PARTIAL -->
<div class="card">
  <div class="label">PARTIAL (km)</div>
  <div id="partial" class="big">0.000</div>
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<!-- ADD ALERT -->
<div class="card">
  <div class="label">Dodaj opozorilo (TOTAL)</div>

  <div class="row">
    <input id="alertTxt" type="text" placeholder="Besedilo opozorila" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Pred točko:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ OPOZORILO</button>
  </div>
</div>

<!-- ACTIVE ALERTS -->
<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="list"></div>
</div>

<!-- LOG -->
<div class="card">
  <div class="label">Log (zadnjih 20)</div>
  <div id="log" class="log"></div>
</div>

<!-- POPUP -->
<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
/* ===== GLOBALS ===== */
let total=0, partial=0, last=null, measure=false;
let leadM=200;              // ✅ default 200 m
let minStep=0.3, maxAcc=30;
let wps=[];
let wakeLock=null;
const LOG_MAX=20;

const $=id=>document.getElementById(id);
const fmt=m=>(m/1000).toFixed(3);

/* ===== LOG ===== */
function log(msg){
  const box=$('log');
  const lines=box.textContent.split('\n').filter(l=>l);
  lines.push(msg);
  while(lines.length>LOG_MAX) lines.shift();
  box.textContent=lines.join('\n');
  box.scrollTop=box.scrollHeight;
}

/* ===== ALERT UI ===== */
function showAlert(msg){
  $('amsg').textContent=msg;
  const a=$('alert');
  a.style.display='block';
  clearTimeout(showAlert.t);
  showAlert.t=setTimeout(()=>a.style.display='none',6000);
}

/* ===== SOUND ===== */
function beep(f=900,m=180){
  try{
    const c=new AudioContext(),o=c.createOscillator();
    o.frequency.value=f;o.connect(c.destination);o.start();
    setTimeout(()=>{o.stop();c.close();},m);
  }catch{}
}
function say(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang='sl-SI';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ===== ALERT CHECK ===== */
function checkAlerts(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;

    if(!w.pre && d<=w.lead && d>0){
      w.pre=true;
      beep(600,120);
      log(`PRE: ${w.txt}`);
      renderAlerts();
    }

    if(!w.alert && d<=0){
      w.alert=true;
      w.passed=true;
      beep();
      navigator.vibrate?.(250);
      say(w.txt);
      showAlert(w.txt);
      log(`ALERT: ${w.txt}`);
      renderAlerts();
    }
  }
}

/* ===== ALERT LIST ===== */
function renderAlerts(){
  const box=$('alertList');
  if(!wps.length){
    box.innerHTML='<div style="opacity:.6">Ni opozoril</div>';
    return;
  }
  box.innerHTML=wps.map((w,i)=>{
    const d=Math.round(w.km*1000-total);
    const s=w.passed?'✅':(w.pre?'⚠️':'⏳');
    return `
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <div>${s} ${w.txt}<br><span style="opacity:.6">${d>0?d+' m':'—'}</span></div>
        <div>
          <button onclick="editAlert(${i})">✏️</button>
          <button onclick="delAlert(${i})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

function delAlert(i){ wps.splice(i,1); renderAlerts(); }

function editAlert(i){
  const w=wps[i];
  const nt=prompt('Besedilo:',w.txt);
  if(nt===null) return;
  w.txt=nt;
  w.pre=w.alert=w.passed=false;
  renderAlerts();
}

/* ===== GPS INIT (OB ZAGONU!) ===== */
if('geolocation' in navigator){
  navigator.geolocation.watchPosition(
    p=>{
      const acc=p.coords.accuracy;
      $('gpss').textContent=`GPS OK (acc ${Math.round(acc)} m)`;
      if(acc>maxAcc) return;

      const now={lat:p.coords.latitude,lon:p.coords.longitude};
      if(last){
        const R=6371000,rad=x=>x*Math.PI/180;
        const d=Math.acos(
          Math.sin(rad(last.lat))*Math.sin(rad(now.lat))+
          Math.cos(rad(last.lat))*Math.cos(rad(now.lat))*
          Math.cos(rad(now.lon-last.lon))
        )*R;

        if(measure && d>=minStep){
          total+=d; partial+=d;
          $('total').textContent=fmt(total);
          $('partial').textContent=fmt(partial);
          checkAlerts();
        }
      }
      last=now;
    },
    e=>{
      $('gpss').textContent='GPS napaka';
      log('GPS ERR');
    },
    {enableHighAccuracy:true,maximumAge:0,timeout:8000}
  );
}else{
  $('gpss').textContent='GPS ni podprt';
}

/* ===== BUTTONS ===== */
$('startBtn').onclick=()=>{
  measure=true; partial=0;
  $('startBtn').classList.add('active');
  $('stopBtn').classList.remove('active');
  log('START');
};
$('stopBtn').onclick=()=>{
  measure=false;
  $('stopBtn').classList.add('active');
  $('startBtn').classList.remove('active');
  log('STOP');
};

/* Lead buttons */
document.querySelectorAll('.leadBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.leadBtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    leadM=Number(b.dataset.m);
  };
});

$('addAlert').onclick=()=>{
  const txt=$('alertTxt').value.trim()||'Opozorilo';
  wps.push({
    km:(total+leadM)/1000,
    txt,
    lead:leadM,
    pre:false, alert:false, passed:false
  });
  $('alertTxt').value='';
  renderAlerts();
  log(`ADD: ${txt} (+${leadM}m)`);
};

/* Wake lock */
$('btnWake').onclick=async()=>{
  try{
    if(!wakeLock) wakeLock=await navigator.wakeLock.request('screen');
    else{ await wakeLock.release(); wakeLock=null; }
  }catch{}
};

renderAlerts();
</script>
</body>
</html>
``
