<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Final Stable</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.bigTotal{ font-size:3.6rem; }

.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
}
button{ cursor:pointer; }

.primary{ background:#143247; }

.bigCorr{ font-size:1.6rem; padding:18px 30px; }
.bigAdd{ font-size:1.4rem; padding:16px 28px; }

.leadBtn.active,
#startBtn.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}
#stopBtn.active{
  background:#7a2222;
  border-color:#a23a3a;
}

.log{
  max-height:320px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
  white-space:pre-wrap;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big bigTotal">0.000</div>

  <div class="row">
    <button id="tm" class="bigCorr">−10 m</button>
    <button id="tp" class="bigCorr">+10 m</button>
  </div>

  <div class="label">GPS status:</div><div id="gpss">Čakam GPS fix…</div>
  <div class="label">Natančnost:</div><div id="acca">—</div>
  <div class="label">Koordinate:</div><div id="coords">—</div>
</div>

<!-- NEXT ALERT -->
<div class="card">
  <div class="label">Naslednje opozorilo</div>
  <div id="nextD" class="big">— m</div>
</div>

<!-- CONTROL -->
<div class="card">
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<!-- ADD ALERT -->
<div class="card">
  <div class="label">Dodaj opozorilo</div>
  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Čez (m)" style="width:120px">
    <input id="alertTxt" type="text" placeholder="Besedilo" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Predopozorilo:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ</button>
  </div>

  <!-- ✅ MIN STEP SETTING -->
  <div class="row" style="margin-top:12px">
    <span class="label">MinStep (m):</span>
    <input id="minStepIn" type="number" step="0.1" min="0" value="0.3" style="width:90px">
    <span class="label">(GPS filter)</span>
  </div>
</div>

<!-- LOG -->
<div class="card">
  <div class="row" style="justify-content:space-between">
    <div class="label">Log</div>
    <label>
      <input id="logToggle" type="checkbox" checked> Log ON
    </label>
  </div>
  <div id="log" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
/* ===== GLOBALS ===== */
let watchId=null,last=null,total=0,measure=false;
let leadM=200,minStep=0.3,maxAcc=30;
let wps=[],wakeLock=null;
const LOG_MAX=20;
let loggingEnabled=true;

const $=id=>document.getElementById(id);
const fmt=x=>(x/1000).toFixed(3);
const ts=()=>new Date().toLocaleTimeString();

/* ===== LOG ===== */
function log(msg){
  if(!loggingEnabled) return;
  const box=$('log');
  const lines=(box.textContent?box.textContent.split('\n'):[]);
  lines.push(`[${ts()}] ${msg}`);
  while(lines.length>LOG_MAX) lines.shift();
  box.textContent=lines.join('\n');
  box.scrollTop=box.scrollHeight;
}

/* ===== HAVERSINE ===== */
function hav(a,b){
  const R=6371000,toRad=d=>d*Math.PI/180;
  let dLat=toRad(b.lat-a.lat),dLon=toRad(b.lon-a.lon);
  let h=Math.sin(dLat/2)**2+
        Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*
        Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

/* ===== GPS INIT ===== */
function gpsInit(){
  navigator.geolocation.getCurrentPosition(
    p=>log(`GPS pre-warm OK (${Math.round(p.coords.accuracy)} m)`),
    ()=>log('GPS pre-warm ERR'),
    {enableHighAccuracy:true,timeout:5000}
  );

  watchId=navigator.geolocation.watchPosition(p=>{
    const acc=p.coords.accuracy;
    $('acca').textContent=Math.round(acc)+' m';
    $('coords').textContent=
      p.coords.latitude.toFixed(6)+', '+p.coords.longitude.toFixed(6);

    if(acc<=maxAcc){
      $('gpss').textContent='Signal OK';
      const now={lat:p.coords.latitude,lon:p.coords.longitude};
      if(last){
        const d=hav(last,now);
        if(measure && d>=minStep){
          total+=d;
          $('total').textContent=fmt(total);
          checkAlerts();
        }
      }
      last=now;
    }else{
      $('gpss').textContent='Slab signal';
    }
  },()=>log('GPS watch ERR'),
  {enableHighAccuracy:true,maximumAge:0,timeout:8000});
}

/* ===== ALERTS ===== */
function updateNext(){
  let best=Infinity;
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;
    if(d>0 && d<best) best=d;
  }
  $('nextD').textContent=best<Infinity?Math.round(best)+' m':'— m';
}
function checkAlerts(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;
    if(!w.pre && d<=w.lead && d>0){ w.pre=true; log('PRE '+w.txt); }
    if(!w.alert && d<=0){
      w.alert=true;w.passed=true;
      navigator.vibrate?.(250);
      showAlert(w.txt);
      log('ALERT '+w.txt);
    }
  }
  updateNext();
}
function showAlert(t){
  $('amsg').textContent=t;
  $('alert').style.display='block';
  setTimeout(()=>$('alert').style.display='none',6000);
}

/* ===== BUTTONS ===== */
$('startBtn').onclick=()=>{
  measure=true;
  $('startBtn').classList.add('active');
  $('stopBtn').classList.remove('active');
  log('START');
};
$('stopBtn').onclick=()=>{
  measure=false;
  $('stopBtn').classList.add('active');
  $('startBtn').classList.remove('active');
  log('STOP');
};

/* TOTAL correction */
$('tm').onclick=()=>{total=Math.max(0,total-10);$('total').textContent=fmt(total);updateNext();};
$('tp').onclick=()=>{total+=10;$('total').textContent=fmt(total);updateNext();};

/* Lead select */
document.querySelectorAll('.leadBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.leadBtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    leadM=Number(b.dataset.m);
  };
});

/* Add alert */
$('addAlert').onclick=()=>{
  const d=Number($('alertDist').value);
  if(!d||d<=0) return;
  const txt=$('alertTxt').value||'Opozorilo';
  wps.push({km:(total+d)/1000,txt,lead:leadM,pre:false,alert:false,passed:false});
  $('alertDist').value='';$('alertTxt').value='';
  updateNext();
  log(`ADD ${txt} +${d}m`);
};

/* ✅ MinStep input */
$('minStepIn').onchange=e=>{
  const v=Number(e.target.value);
  if(!isNaN(v)&&v>=0){
    minStep=v;
    log(`MinStep=${minStep} m`);
  }
};

/* ✅ Wake‑Lock FIX */
$('btnWake').onclick=async()=>{
  try{
    if(!('wakeLock' in navigator)){
      log('Wake‑Lock ni podprt');
      return;
    }
    if(!wakeLock){
      wakeLock=await navigator.wakeLock.request('screen');
      $('btnWake').textContent='🔒 Wake‑Lock ON';
      log('Wake‑Lock ON');
      wakeLock.addEventListener('release',()=>{
        $('btnWake').textContent='🔆 Wake‑Lock';
        wakeLock=null;
        log('Wake‑Lock RELEASED');
      });
    }else{
      await wakeLock.release();
      wakeLock=null;
      $('btnWake').textContent='🔆 Wake‑Lock';
      log('Wake‑Lock OFF');
    }
  }catch(e){
    log('Wake‑Lock ERR');
  }
};

$('logToggle').onchange=e=>{
  loggingEnabled=e.target.checked;
  if(!loggingEnabled) $('log').textContent='';
};

gpsInit();
updateNext();
</script>
</body>
</html>
