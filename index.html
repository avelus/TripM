
<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Final</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{ font-size:2.4rem; font-weight:800; font-family:monospace; }
.bigTotal{ font-size:3.6rem; }
.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
}
button{ cursor:pointer; }
.primary{ background:#143247; }
.bigCorr{ font-size:1.6rem; padding:18px 24px; }

button.active{ background:#1d5a2b; border-color:#2e7d3d; }
button.warn{ background:#5a1d1d; }
button.info{ background:#1d3e5a; }

.leadBtn.active{ background:#1d5a2b; }

.log{
  max-height:300px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:monospace;
  font-size:.85rem;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:14px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big bigTotal">0.000</div>

  <div class="row">
    <button id="tm" class="bigCorr">−10 m</button>
    <button id="tp" class="bigCorr">+10 m</button>
    <button id="resetTotal" class="warn">⟲ RESET</button>
  </div>

  <div class="label">GPS status:</div><div id="gpss">Čakam GPS…</div>
  <div class="label">Natančnost:</div><div id="acca">—</div>
</div>

<div class="card">
  <div class="label">Naslednje opozorilo</div>
  <div id="nextD" class="big">— m</div>
</div>

<div class="card">
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<div class="card">
  <div class="label">Dodaj opozorilo (ABSOLUTNA razdalja)</div>
  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Razdalja (m)">
    <input id="alertTxt" type="text" placeholder="Besedilo">
  </div>

  <div class="row" style="margin-top:8px">
    <span class="label">Predopozorilo:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <button id="addAlert" class="primary" style="margin-top:8px">➕ DODAJ</button>
</div>

<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
let total=0,last=null,measure=false;
let leadM=200,wps=[],wakeLock=null;
const $=id=>document.getElementById(id);
const fmt=x=>(x/1000).toFixed(3);

function speak(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang='sl-SI';
  speechSynthesis.speak(u);
}

function showAlert(t){
  $('amsg').textContent=t;
  $('alert').style.display='block';
  navigator.vibrate?.(300);
  speak(t);
  setTimeout(()=>$('alert').style.display='none',5000);
}

function checkAlerts(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;

    if(!w.pre && d<=w.lead && d>0){
      w.pre=true;
      navigator.vibrate?.(150);
      speak(w.txt);
    }

    if(!w.alert && d<=0){
      w.alert=true; w.passed=true;
      showAlert(w.txt);
    }
    if(d>0) break;
  }
  updateNext(); renderAlerts();
}

function updateNext(){
  let best=Infinity;
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;
    if(d>0 && d<best) best=d;
  }
  $('nextD').textContent=best<Infinity?Math.round(best)+' m':'— m';
}

function renderAlerts(){
  const box=$('alertList');
  box.textContent='';
  wps.forEach((w,i)=>{
    if(w.passed) return;
    box.innerHTML+=`${Math.round(w.km*1000-total)} m – ${w.txt}
      <button onclick="wps.splice(${i},1);renderAlerts()">🗑</button><br>`;
  });
}

$('addAlert').onclick=()=>{
  const d=Number($('alertDist').value);
  if(!d) return;
  wps.push({km:d/1000,txt:$('alertTxt').value||'Opozorilo',lead:leadM,pre:false,alert:false,passed:false});
  wps.sort((a,b)=>a.km-b.km);
  $('alertDist').value=''; $('alertTxt').value='';
  renderAlerts(); updateNext();
};

$('resetTotal').onclick=()=>{
  if(!confirm('Resetiram TOTAL?')) return;
  total=0; $('total').textContent=fmt(total);
  wps.forEach(w=>{w.pre=false;w.alert=false;w.passed=false;});
  updateNext(); renderAlerts();
};

$('tm').onclick=()=>{ total=Math.max(0,total-10); $('total').textContent=fmt(total); checkAlerts(); };
$('tp').onclick=()=>{ total+=10; $('total').textContent=fmt(total); checkAlerts(); };

document.querySelectorAll('.leadBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.leadBtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); leadM=Number(b.dataset.m);
  };
});
</script>
</body>
</html>
