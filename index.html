<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TripM – Manual Alerts</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
  font-size:1rem;
}
button{ cursor:pointer; }

.primary{ background:#143247; border-color:#255a79; }
.ok{ background:#0f2b22; border-color:#1c5b45; }
.danger{ background:#3a1618; border-color:#6b2226; }

.bigAdd{
  font-size:1.4rem;
  padding:16px 28px;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:360px;
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
  text-align:center;
}

.log{
  max-height:200px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.9rem;
  white-space:pre-wrap;
}

#startBtn,#stopBtn{ font-size:1.6rem; padding:18px 26px; }
#startBtn.active{ background:#1d5a2b; }
#stopBtn.active{ background:#7a2222; }
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big">0.000</div>

  <div class="label">GPS status</div>
  <div id="gpss">Čakam GPS…</div>
</div>

<!-- PARTIAL + CONTROL -->
<div class="card">
  <div class="label">PARTIAL (km)</div>
  <div id="partial" class="big">0.000</div>

  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<!-- ALERT ENTRY -->
<div class="card">
  <div class="label">Ročni vnos opozoril (med vožnjo)</div>

  <div class="row">
    <input id="alertDist" type="number" min="1"
           placeholder="Čez (m)" style="width:120px">

    <input id="alertTxt" type="text"
           placeholder="Besedilo opozorila" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ OPOZORILO</button>
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Predopozorilo:</span>
    <button data-lead="50">50 m</button>
    <button data-lead="100">100 m</button>
    <button data-lead="200">200 m</button>
    <span class="label">Lead = <span id="leadVal">50</span> m</span>
  </div>
</div>

<!-- LOG -->
<div class="card">
  <div class="label">Log</div>
  <div id="log" class="log"></div>
</div>

<!-- ALERT POPUP -->
<div id="alert" class="alert">
  <div id="amsg">Opozorilo</div>
</div>

<script>
/* ===== GLOBALS ===== */
let total=0, partial=0;
let last=null, measure=false;
let leadM=50, maxAcc=30, minStep=0.3;
let wps=[];
let wakeLock=null;
const LOG_MAX=20;

const $=id=>document.getElementById(id);
const fmt=m=>(m/1000).toFixed(3);

/* ===== LOG ===== */
function log(msg){
  const box=$('log');
  const lines=box.textContent.split('\n').filter(l=>l);
  lines.push(msg);
  while(lines.length>LOG_MAX) lines.shift();
  box.textContent=lines.join('\n');
  box.scrollTop=box.scrollHeight;
}

/* ===== ALERT UI ===== */
function showAlert(txt){
  $('amsg').textContent=txt;
  $('alert').style.display='block';
  clearTimeout(showAlert.t);
  showAlert.t=setTimeout(()=> $('alert').style.display='none',7000);
}

/* ===== SOUND ===== */
function beep(f=800,m=180){
  try{
    const c=new AudioContext();
    const o=c.createOscillator();
    o.frequency.value=f;
    o.connect(c.destination);
    o.start();
    setTimeout(()=>{o.stop();c.close();},m);
  }catch{}
}
function say(txt){
  try{
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='sl-SI';
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch{}
}

/* ===== WAYPOINT CHECK ===== */
function checkWP(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;

    if(!w.pre && d<=leadM && d>0){
      w.pre=true;
      beep(600,120);
      showAlert(`Kmalu: ${w.txt}`);
      log(`PRE ${w.txt} (${Math.round(d)}m)`);
    }

    if(!w.alert && d<=0){
      w.alert=true;
      w.passed=true;
      beep(950,220);
      navigator.vibrate?.(250);
      say(w.txt);
      showAlert(w.txt);
      log(`ALERT ${w.txt}`);
    }
  }
}

/* ===== GPS ===== */
navigator.geolocation.watchPosition(p=>{
  const acc=p.coords.accuracy;
  $('gpss').textContent=`GPS acc ${Math.round(acc)} m`;
  if(acc>maxAcc) return;

  const now={lat:p.coords.latitude,lon:p.coords.longitude};
  if(last){
    const R=6371000,rad=x=>x*Math.PI/180;
    const d=Math.acos(
      Math.sin(rad(last.lat))*Math.sin(rad(now.lat))+
      Math.cos(rad(last.lat))*Math.cos(rad(now.lat))*Math.cos(rad(now.lon-last.lon))
    )*R;

    if(measure && d>=minStep){
      total+=d; partial+=d;
      $('total').textContent=fmt(total);
      $('partial').textContent=fmt(partial);
      checkWP();
    }
  }
  last=now;
},{},{enableHighAccuracy:true});

/* ===== BUTTONS ===== */
$('startBtn').onclick=()=>{
  measure=true;
  partial=0;
  $('startBtn').classList.add('active');
  $('stopBtn').classList.remove('active');
  log('START');
};

$('stopBtn').onclick=()=>{
  measure=false;
  $('stopBtn').classList.add('active');
  $('startBtn').classList.remove('active');
  log('STOP');
};

$('addAlert').onclick=()=>{
  if(!measure) return showAlert('Najprej START');
  const d=Number($('alertDist').value);
  if(!d||d<=0) return showAlert('Napačna razdalja');

  const txt=$('alertTxt').value || `Opozorilo čez ${d} m`;
  wps.push({
    km:(total+d)/1000,
    txt, pre:false, alert:false, passed:false
  });
  showAlert('Opozorilo dodano');
  log(`ADD ${txt} (${d}m)`);
  $('alertDist').value='';
  $('alertTxt').value='';
};

document.querySelectorAll('[data-lead]').forEach(b=>{
  b.onclick=()=>{
    leadM=Number(b.dataset.lead);
    $('leadVal').textContent=leadM;
    log(`Lead=${leadM}m`);
  };
});

/* ===== WAKELOCK ===== */
$('btnWake').onclick=async()=>{
  try{
    if(!wakeLock){
      wakeLock=await navigator.wakeLock.request('screen');
      $('btnWake').textContent='🔒 Wake‑Lock';
    }else{
      await wakeLock.release();
      wakeLock=null;
      $('btnWake').textContent='🔆 Wake‑Lock';
    }
  }catch{}
};
</script>
</body>
</html>
``
