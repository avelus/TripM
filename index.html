<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Final Stable</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.bigTotal{ font-size:3.6rem; }

.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
}
button{ cursor:pointer; }

.primary{ background:#143247; }

.bigCorr{ font-size:1.6rem; padding:18px 30px; }
.bigAdd{ font-size:1.4rem; padding:16px 28px; }

.leadBtn.active,
#startBtn.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}
#stopBtn.active{
  background:#7a2222;
  border-color:#a23a3a;
}

.list{
  max-height:220px;
  overflow:auto;
  border:1px dashed #203043;
  padding:8px;
  border-radius:10px;
}

.log{
  max-height:320px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
  white-space:pre-wrap;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big bigTotal">0.000</div>

  <div class="row">
    <button id="tm" class="bigCorr">−10 m</button>
    <button id="tp" class="bigCorr">+10 m</button>
  </div>

  <div class="label">GPS status:</div><div id="gpss">Čakam GPS fix…</div>
  <div class="label">Natančnost:</div><div id="acca">—</div>
  <div class="label">Koordinate:</div><div id="coords">—</div>
</div>

<!-- NEXT ALERT -->
<div class="card">
  <div class="label">Naslednje opozorilo</div>
  <div id="nextD" class="big">— m</div>
</div>

<!-- CONTROL -->
<div class="card">
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<!-- ADD ALERT -->
<div class="card">
  <div class="label">Dodaj opozorilo</div>
  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Čez (m)" style="width:120px">
    <input id="alertTxt" type="text" placeholder="Besedilo" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Predopozorilo:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ</button>
  </div>
</div>

<!-- ✅ AKTIVNA OPOZORILA (POVRNJENO) -->
<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="list"></div>
</div>

<!-- LOG -->
<div class="card">
  <div class="row" style="justify-content:space-between">
    <div class="label">Log</div>
    <label><input id="logToggle" type="checkbox" checked> Log ON</label>
  </div>
  <div id="log" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
/* === OBSTOJEČA LOGIKA OSTANE === */
/* Tukaj je samo POVRNJENA logika za prikaz in urejanje opozoril */

function renderAlerts(){
  const box=document.getElementById('alertList');
  if(!wps.length){
    box.innerHTML='<div style="opacity:.6">Ni opozoril</div>';
    return;
  }
  box.innerHTML=wps.map((w,i)=>{
    const d=Math.round(w.km*1000-total);
    const s=w.passed?'✅':(w.pre?'⚠️':'⏳');
    return `
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <div>
          ${s} ${w.txt}<br>
          <span style="opacity:.6">${d>0?d+' m':'—'} | lead ${w.lead} m</span>
        </div>
        <div>
          <button onclick="editAlert(${i})">✏️</button>
          <button onclick="delAlert(${i})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

function delAlert(i){
  wps.splice(i,1);
  renderAlerts();
  updateNext();
}

function editAlert(i){
  const w=wps[i];
  const nd=prompt('Razdalja (m od zdaj):', Math.round(w.km*1000-total));
  if(nd===null) return;
  const nt=prompt('Besedilo:', w.txt);
  if(nt===null) return;
  const nl=prompt('Predopozorilo (m):', w.lead);
  if(nl===null) return;

  w.km=(total+Number(nd))/1000;
  w.txt=nt;
  w.lead=Number(nl)||w.lead;
  w.pre=w.alert=w.passed=false;

  renderAlerts();
  updateNext();
}
</script>
</body>
</html>
