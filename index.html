<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TripM – Roadbook Trip Alerts</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  -webkit-user-select:none;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.35rem;
  font-weight:700;
  font-family:monospace;
}
.label{
  color:#a3b8d4;
  font-size:.9rem;
}
.row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  align-items:center;
}
button, input, select{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:8px 12px;
  border-radius:10px;
  font-size:1rem;
}
button{ cursor:pointer; }
.primary{
  background:#143247;
  border-color:#255a79;
}
.ok{
  background:#0f2b22;
  border-color:#1c5b45;
}
.danger{
  background:#3a1618;
  border-color:#6b2226;
}
.list{
  max-height:220px;
  overflow:auto;
  border:1px dashed #203043;
  padding:8px;
  border-radius:10px;
}
.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  max-width:350px;
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:10px;
  display:none;
  z-index:9999;
  text-align:center;
}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big">0.000</div>
  <div class="row">
    <button id="tm">−0.010</button>
    <button id="tp">+0.010</button>
    <input id="setT" type="number" step="0.001" placeholder="12.345">
    <button id="setTb" class="ok">Nastavi</button>
    <button id="rT" class="danger">Reset TOTAL</button>
  </div>
  <div class="label" id="gpss">GPS inicializacija…</div>
  <div class="label" id="acca">Natančnost: —</div>
</div>

<!-- PARTIAL -->
<div class="card">
  <div class="label">PARTIAL (km)</div>
  <div id="partial" class="big">0.000</div>
  <div class="row">
    <button id="pm">−0.010</button>
    <button id="pp">+0.010</button>
    <button id="rP" class="ok">Reset PARTIAL</button>
  </div>
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
  </div>
</div>

<!-- NEXT POINT -->
<div class="card">
  <div class="label">Naslednja točka</div>
  <div id="nextD" class="big" style="font-size:1.8rem">— m</div>
  <div id="nextL" class="label">Ni naloženih točk.</div>
</div>

<!-- CSV LOADING -->
<div class="card">
  <div class="label">CSV datoteke (root)</div>
  <div class="row">
    <select id="csvSel"></select>
    <button id="loadSel" class="primary">Naloži</button>
  </div>
  <div class="row">
    <input id="urlIn" type="url" placeholder="https://…/waypoints.csv" style="flex:1">
    <button id="loadUrl">URL load</button>
  </div>
</div>

<!-- ALERT SETTINGS -->
<div class="card">
  <div class="label">Opozorila</div>
  <div class="row">
    <label>Lead (m):</label><input id="lead" type="number" value="50" min="0" step="5" style="width:80px">
    <label>MaxAcc (m):</label><input id="maxAcc" type="number" value="30" min="5" style="width:80px">
    <label>MinStep (m):</label><input id="minStep" type="number" value="2" min="0" style="width:80px">
  </div>
</div>

<!-- WAYPOINT LIST -->
<div class="card">
  <div class="label">Točke</div>
  <div id="wpList" class="list"></div>
  <div class="row">
    <input id="qTxt" type="text" placeholder="Opis" style="flex:1">
    <button id="addHere" class="primary">Dodaj @TOTAL</button>
    <button id="clr" class="danger">Počisti</button>
    <button id="exp" class="ok">Izvozi CSV</button>
  </div>
</div>

<!-- ALERT POPUP -->
<div id="alert" class="alert">
  <div id="amsg">Opozorilo</div>
</div>


<script>
// ---------------------------
// GLOBALS
// ---------------------------
let watchId=null,last=null,total=0,partial=0,measure=false;
let leadM=50, maxA=30, minS=2;
let wps=[], autoHide=8000; // ms
const USER="avelus", REPO="TripM";

// SHORTHAND
const $ = id => document.getElementById(id);

// ---------------------------
// FORMAT & MATH
// ---------------------------
function fmt(x){ return (x/1000).toFixed(3); }
function hav(a,b){
  const R=6371000, toRad=d=>d*Math.PI/180;
  let dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
  let h=Math.sin(dLat/2)**2 +
         Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

// ---------------------------
// UI UPDATE
// ---------------------------
function update(){
  $('total').textContent = fmt(total);
  $('partial').textContent = fmt(partial);
  nextWp();
}
function nextWp(){
  if(!wps.length){
    $('nextD').textContent='— m';
    $('nextL').textContent='Ni točk';
    return;
  }
  let bestDist=Infinity, label='';
  for(let w of wps){
    if(w.passed) continue;
    let d = w.km*1000 - total;
    if(d>0 && d<bestDist){
      bestDist=d;
      label = `#${w.id} @ ${w.km.toFixed(3)} km — ${w.txt}`;
    }
  }
  if(bestDist===Infinity){
    $('nextD').textContent='— m';
    $('nextL').textContent='Ni več točk';
    return;
  }
  $('nextD').textContent = Math.round(bestDist)+" m";
  $('nextL').textContent = label;
}

// ---------------------------
// ALERT (bottom fixed, auto-hide 8s)
// ---------------------------
function showAlert(msg){
  $('amsg').textContent = msg || 'Opozorilo';
  const a = $('alert');
  a.style.display='block';
  clearTimeout(showAlert._t);
  showAlert._t = setTimeout(()=>a.style.display='none', autoHide);
}

// ---------------------------
// AUDIO + VIBRA + TTS
// ---------------------------
function beep(freq=880,ms=180){
  try{
    const C=window.AudioContext||window.webkitAudioContext;
    const ctx=new C(), o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=freq; o.connect(g); g.connect(ctx.destination);
    o.start(); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+ms/1000);
    setTimeout(()=>{o.stop();ctx.close();},ms);
  }catch(e){}
}
function vibrate(ms=250){ if(navigator.vibrate) navigator.vibrate(ms); }
function say(txt){
  try{
    const u=new SpeechSynthesisUtterance(txt||'Pozor!');
    u.lang='sl-SI'; speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}

// ---------------------------
// CSV LOADING/PARSING
// ---------------------------
async function loadCsv(url){
  const txt = await fetch(url,{cache:'no-store'}).then(r=>r.text());
  localStorage.csv_url = url;
  localStorage.lastCsv = txt;
  parseCsvIntoWps(txt);
  render();
}
function parseCsvIntoWps(txt){
  const rows = txt.split(/\r?\n/).filter(l=>l.trim());
  if(!rows.length){ wps=[]; return; }
  const head = rows[0].toLowerCase();
  const delim = head.includes(';')?';':',';
  const cols = head.split(delim).map(s=>s.trim());

  const iId  = cols.findIndex(c=>['id','wp','waypoint'].includes(c));
  const iTot = cols.findIndex(c=>['distance_km','total_km','dist_km'].includes(c));
  const iPar = cols.findIndex(c=>['partial_km','delta_km'].includes(c));
  const iTxt = cols.findIndex(c=>['text','opis','note','desc'].includes(c));

  let arr=[], cum=0;
  for(let i=1;i<rows.length;i++){
    const a = rows[i].split(delim).map(s=>s.trim());
    if(!a.length) continue;
    const id  = iId>=0 ? a[iId] : i;
    const txt = iTxt>=0 ? a[iTxt] : '';
    let km = NaN;

    // Podpira total ali partial
    if(iTot>=0) km = parseFloat(String(a[iTot]).replace(',','.'));
    if((isNaN(km) || km===undefined) && iPar>=0){
      const pk = parseFloat(String(a[iPar]).replace(',','.'));
      if(!isNaN(pk)) { cum += pk; km = cum; }
    }
    if(isNaN(km)) continue;

    arr.push({ id, km, txt, alerted:false, passed:false });
  }
  wps = arr.sort((a,b)=>a.km-b.km);
}
function render(){
  let H='';
  for(let i=0;i<wps.length;i++){
    const w = wps[i];
    const dist = Math.round(w.km*1000 - total);
    const state = w.passed ? '✔️' : (w.alerted ? '⚠️' : '');
    H += `<div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <div>
              <b>#${w.id}</b> ${w.km.toFixed(3)} km — ${w.txt}
              <span style="opacity:.6">${state} ${dist>0?dist+' m':''}</span>
            </div>
            <div>
              <button class="primary" data-jump="${i}">Skok</button>
              <button class="danger"  data-del="${i}">X</button>
            </div>
          </div>`;
  }
  $('wpList').innerHTML = H || `<div style="opacity:.7">Ni točk</div>`;

  // Bindi gumbov
  document.querySelectorAll('[data-jump]').forEach(b=>{
    b.onclick = ()=>{
      const w = wps[b.dataset.jump];
      total = w.km*1000 - (leadM+1);
      partial = 0;
      update();
    };
  });
  document.querySelectorAll('[data-del]').forEach(b=>{
    b.onclick = ()=>{
      wps.splice(b.dataset.del,1);
      saveLocal();
      render(); nextWp();
    };
  });

  nextWp();
}

// ---------------------------
// GPS INITIALIZATION (pre-warm + watch ON LOAD)
// ---------------------------
function gpsInit(){
  if(!navigator.geolocation){
    $('gpss').textContent='Ni GPS podpore';
    return;
  }
  // 1) Pre-warm: sproži permission + ogreje gps čip
  navigator.geolocation.getCurrentPosition(
    ()=>{$('gpss').textContent='GPS dovoljenje OK, ogrevam…';},
    ()=>{$('gpss').textContent='GPS: dovoli dostop za natančnost';},
    { enableHighAccuracy:true, timeout:5000 }
  );

  // 2) Neprekinjeno sledenje: takoj ob zagonu
  watchId = navigator.geolocation.watchPosition(pos=>{
    const acc = pos.coords.accuracy;
    $('acca').textContent = "Natančnost: " + Math.round(acc) + " m";

    const now = {lat:pos.coords.latitude, lon:pos.coords.longitude};

    if(acc <= maxA){
      if(last){
        const d = hav(last, now);
        if(measure && d >= minS){
          total += d;
          partial += d;
          update();
          checkWP();
        }
      }
      last = now;
    }
  }, err=>{
    $('gpss').textContent="GPS napaka";
  }, { enableHighAccuracy:true, maximumAge:0, timeout:8000 });

  $('gpss').textContent = "GPS aktiviran…";
}

// ---------------------------
// WAYPOINT ALERTS (alerted/passed)
// ---------------------------
function checkWP(){
  for(let w of wps){
    if(w.passed) continue;
    const d = w.km*1000 - total;

    if(!w.alerted && d <= leadM && d > 0){
      w.alerted = true;
      beep(880,180); setTimeout(()=>beep(660,180),220);
      vibrate(200);  say(w.txt||`Točka ${w.id}`);
      showAlert(w.txt || `Točka ${w.id}`);
    }
    if(!w.passed && d <= 0){
      w.passed = true;
    }
  }
  saveLocal(); render(); nextWp();
}

// ---------------------------
// CSV DISCOVERY (GitHub repo root)
// ---------------------------
async function discoverCsv(){
  const api = `https://api.github.com/repos/${USER}/${REPO}/contents/`;
  let resp = await fetch(api).then(r=>r.json()).catch(()=>[]);
  let csvs = resp.filter(f=>f.name && f.name.toLowerCase().endsWith('.csv')).map(f=>f.name);

  if(!csvs.length){
    $('csvSel').innerHTML = '<option>(Ni .csv datotek)</option>';
    return;
  }
  $('csvSel').innerHTML = csvs.map(n=>{
    const u = location.origin + location.pathname.replace('index.html','') + n;
    return `<option value="${u}">${n}</option>`;
  }).join('');

  // Auto-load, če je samo ena
  if(csvs.length===1){
    const url = location.origin + location.pathname.replace('index.html','') + csvs[0];
    await loadCsv(url);
  }
}

// ---------------------------
// ON LOAD
// ---------------------------
window.addEventListener('load', async ()=>{
  // Nastavitve iz localStorage
  try{
    leadM = Number(localStorage.getItem('lead_m')) || 50;
    maxA  = Number(localStorage.getItem('maxAcc')) || 30;
    minS  = Number(localStorage.getItem('minStep'))|| 2;
    const lastTxt = localStorage.getItem('lastCsv') || localStorage.getItem('lastCsvText');
    if(lastTxt){ parseCsvIntoWps(lastTxt); }
  }catch(e){}

  // Izpiši začetno
  render(); nextWp();
  // Zaženi GPS takoj ob zagonu
  gpsInit();

  // Autodiscovery CSV v root
  await discoverCsv();

  // Podpora ?csv=
  const qp = new URLSearchParams(location.search).get('csv');
  if(qp){ await loadCsv(qp); }

  // Če imamo prej izbran CSV, pa wps še prazni
  const lc = localStorage.getItem('csv_url');
  if(lc && !wps.length){ await loadCsv(lc); }
});

// ---------------------------
// BUTTONS
// ---------------------------
$('startBtn').onclick = ()=>{ measure=true; partial=0; update(); };
$('stopBtn').onclick  = ()=>{ measure=false; };

$('rT').onclick = ()=>{ total=0; partial=0; wps.forEach(w=>{w.alerted=false;w.passed=false;}); saveLocal(); update(); };
$('rP').onclick = ()=>{ partial=0; update(); };

$('tm').onclick = ()=>{ total=Math.max(0,total-10); update(); };
$('tp').onclick = ()=>{ total+=10; update(); };
$('pm').onclick = ()=>{ partial=Math.max(0,partial-10); update(); };
$('pp').onclick = ()=>{ partial+=10; update(); };

$('setTb').onclick = ()=>{
  const v = parseFloat(String($('setT').value).replace(',','.'));
  if(!isNaN(v)){ total = Math.max(0, v*1000); update(); }
};

$('loadSel').onclick = ()=>{ const u = $('csvSel').value; if(u) loadCsv(u); };
$('loadUrl').onclick  = ()=>{ const u = $('urlIn').value.trim(); if(u) loadCsv(u); };

$('addHere').onclick = ()=>{
  const txt = $('qTxt').value.trim();
  const id = wps.length ? (Number(wps[wps.length-1].id)||0)+1 : 1;
  wps.push({ id, km: total/1000, txt, alerted:false, passed:false });
  wps.sort((a,b)=>a.km-b.km); saveLocal(); render(); nextWp(); $('qTxt').value='';
};

$('clr').onclick = ()=>{ if(confirm('Počisti vse točke?')){ wps=[]; saveLocal(); render(); nextWp(); } };
$('exp').onclick = ()=>{
  let S='id,distance_km,text\n'; wps.forEach(w=>{ S+=`${w.id},${w.km.toFixed(3)},"${w.txt.replace(/"/g,'""')}"\n`; });
  const B=new Blob([S],{type:'text/csv'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(B); a.download='export.csv'; a.click();
};

$('lead'  ).onchange = e=>{ leadM = parseFloat(e.target.value)||50; localStorage.setItem('lead_m',leadM); };
$('maxAcc').onchange = e=>{ maxA  = parseFloat(e.target.value)||30; localStorage.setItem('maxAcc',maxA); };
$('minStep').onchange= e=>{ minS  = parseFloat(e.target.value)||2;  localStorage.setItem('minStep',minS); };
</script>

</body>
</html>
