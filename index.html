<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Manual Alerts PRO</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
}
button{ cursor:pointer; }
.primary{ background:#143247; }
.bigAdd{ font-size:1.4rem; padding:16px 28px; }

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
}

.list{
  max-height:220px;
  overflow:auto;
  border:1px dashed #203043;
  padding:8px;
  border-radius:10px;
}

.log{
  max-height:180px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
}
#startBtn,#stopBtn{font-size:1.6rem;padding:18px 26px;}
#startBtn.active{background:#1d5a2b;}
#stopBtn.active{background:#7a2222;}
</style>
</head>

<body>

<!-- TOTAL -->
<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big">0.000</div>
  <div id="gpss" class="label">Čakam GPS…</div>
</div>

<!-- PARTIAL -->
<div class="card">
  <div class="label">PARTIAL (km)</div>
  <div id="partial" class="big">0.000</div>
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<!-- ADD ALERT -->
<div class="card">
  <div class="label">Dodaj opozorilo</div>
  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Čez (m)" style="width:120px">
    <input id="alertTxt" type="text" placeholder="Besedilo" style="flex:1">
  </div>
  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ</button>
  </div>
  <div class="label" style="margin-top:6px">
    Predopozorilo: <b>100 m</b>
  </div>
</div>

<!-- ACTIVE ALERTS -->
<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="list"></div>
</div>

<!-- LOG -->
<div class="card">
  <div class="label">Log</div>
  <div id="log" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
/* ===== GLOBALS ===== */
let total=0,partial=0,last=null,measure=false;
let leadM=100;               // ✅ DEFAULT 100 m
let minStep=0.3,maxAcc=30;
let wps=[];
let wakeLock=null;

const $=id=>document.getElementById(id);
const fmt=m=>(m/1000).toFixed(3);

/* ===== LOG ===== */
function log(m){
  const box=$('log');
  box.textContent+=(box.textContent?'\n':'')+m;
  box.scrollTop=box.scrollHeight;
}

/* ===== UI ===== */
function showAlert(t){
  $('amsg').textContent=t;
  $('alert').style.display='block';
  setTimeout(()=>$('alert').style.display='none',6000);
}

/* ===== SOUND ===== */
function beep(f=900,m=180){
  try{
    const c=new AudioContext(),o=c.createOscillator();
    o.frequency.value=f;o.connect(c.destination);o.start();
    setTimeout(()=>{o.stop();c.close();},m);
  }catch{}
}
function say(t){
  const u=new SpeechSynthesisUtterance(t);
  u.lang='sl-SI';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* ===== ALERT LOGIC ===== */
function checkWP(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;

    if(!w.pre && d<=leadM && d>0){
      w.pre=true;
      beep(600,120);
      log(`PRE ${w.txt}`);
    }
    if(!w.alert && d<=0){
      w.alert=true;
      w.passed=true;
      beep();
      navigator.vibrate?.(250);
      say(w.txt);
      showAlert(w.txt);
      log(`ALERT ${w.txt}`);
    }
  }
  renderAlerts();
}

/* ===== ALERT LIST ===== */
function renderAlerts(){
  const box=$('alertList');
  if(!wps.length){
    box.innerHTML='<div style="opacity:.6">Ni opozoril</div>';
    return;
  }
  box.innerHTML=wps.map((w,i)=>{
    const d=Math.round(w.km*1000-total);
    const s=w.passed?'✅':(w.pre?'⚠️':'⏳');
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div>${s} ${w.txt}<br><span style="opacity:.6">${d>0?d+' m':'—'}</span></div>
        <div>
          <button onclick="editAlert(${i})">✏️</button>
          <button onclick="delAlert(${i})">🗑️</button>
        </div>
      </div>`;
  }).join('');
}
function delAlert(i){
  wps.splice(i,1);
  renderAlerts();
}
function editAlert(i){
  const w=wps[i];
  const nd=prompt('Razdalja (m od zdaj):',Math.max(1,Math.round(w.km*1000-total)));
  if(nd===null) return;
  const nt=prompt('Besedilo:',w.txt);
  if(nt===null) return;
  w.km=(total+Number(nd))/1000;
  w.txt=nt;
  w.pre=false;w.alert=false;w.passed=false;
  renderAlerts();
}

/* ===== GPS ===== */
navigator.geolocation.watchPosition(p=>{
  const acc=p.coords.accuracy;
  $('gpss').textContent=`GPS acc ${Math.round(acc)} m`;
  if(acc>maxAcc) return;

  const now={lat:p.coords.latitude,lon:p.coords.longitude};
  if(last){
    const R=6371000,rad=x=>x*Math.PI/180;
    const d=Math.acos(
      Math.sin(rad(last.lat))*Math.sin(rad(now.lat))+
      Math.cos(rad(last.lat))*Math.cos(rad(now.lat))*Math.cos(rad(now.lon-last.lon))
    )*R;

    if(measure && d>=minStep){
      total+=d;partial+=d;
      $('total').textContent=fmt(total);
      $('partial').textContent=fmt(partial);
      checkWP();
    }
  }
  last=now;
},{},{enableHighAccuracy:true});

/* ===== BUTTONS ===== */
$('startBtn').onclick=()=>{
  measure=true;partial=0;
  $('startBtn').classList.add('active');
  $('stopBtn').classList.remove('active');
};
$('stopBtn').onclick=()=>{
  measure=false;
  $('stopBtn').classList.add('active');
  $('startBtn').classList.remove('active');
};
$('addAlert').onclick=()=>{
  if(!measure) return showAlert('Najprej START');
  const d=Number($('alertDist').value);
  if(!d) return;
  const txt=$('alertTxt').value||`Opozorilo čez ${d} m`;
  wps.push({km:(total+d)/1000,txt,pre:false,alert:false,passed:false});
  $('alertDist').value='';$('alertTxt').value='';
  renderAlerts();
};
$('btnWake').onclick=async()=>{
  if(!wakeLock){
    wakeLock=await navigator.wakeLock.request('screen');
  }else{
    await wakeLock.release();wakeLock=null;
  }
};
</script>
</body>
</html>
``
