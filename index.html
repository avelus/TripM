<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TripM – Final (Original GPS)</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#eaf2ff;
  font-family:system-ui,Arial;
  user-select:none;
}
.card{
  background:#121a23;
  border:1px solid #203043;
  border-radius:12px;
  padding:12px;
  margin:10px;
}
.big{
  font-size:2.4rem;
  font-weight:800;
  font-family:ui-monospace,monospace;
}
.bigTotal{ font-size:3.6rem; }

.label{ color:#a3b8d4; font-size:.9rem; }
.row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

button,input{
  background:#0f1620;
  color:#eaf2ff;
  border:1px solid #2c3c50;
  padding:10px 12px;
  border-radius:10px;
}
button{ cursor:pointer; }

.primary{ background:#143247; }
.bigCorr{ font-size:1.6rem; padding:18px 30px; }
.bigAdd{ font-size:1.4rem; padding:16px 28px; }

button.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}
button.warn{
  background:#5a1d1d;
  border-color:#7d2e2e;
}
button.info{
  background:#1d3e5a;
  border-color:#2e5c7d;
}

.leadBtn.active{
  background:#1d5a2b;
  border-color:#2e7d3d;
}

.log{
  max-height:320px;
  overflow:auto;
  border:1px dashed #34465e;
  background:#0f1620;
  padding:8px;
  border-radius:10px;
  font-family:ui-monospace,monospace;
  font-size:.85rem;
  white-space:pre-wrap;
}

.alert{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  background:#0c1a25;
  border:2px solid #ffd166;
  border-radius:14px;
  padding:12px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<div class="card">
  <div class="label">TOTAL (km)</div>
  <div id="total" class="big bigTotal">0.000</div>

  <div class="row">
    <button id="tm" class="bigCorr">−10 m</button>
    <button id="tp" class="bigCorr">+10 m</button>
  </div>

  <div class="label">GPS status:</div><div id="gpss">Čakam GPS fix…</div>
  <div class="label">Natančnost:</div><div id="acca">—</div>
  <div class="label">Koordinate:</div><div id="coords">—</div>
</div>

<div class="card">
  <div class="label">Naslednje opozorilo</div>
  <div id="nextD" class="big">— m</div>
</div>

<div class="card">
  <div class="row">
    <button id="startBtn" class="primary">▶ START</button>
    <button id="stopBtn">⏸ STOP</button>
    <button id="btnWake">🔆 Wake‑Lock</button>
  </div>
</div>

<div class="card">
  <div class="label">Dodaj opozorilo</div>
  <div class="row">
    <input id="alertDist" type="number" min="1" placeholder="Čez (m)" style="width:120px">
    <input id="alertTxt" type="text" placeholder="Besedilo" style="flex:1">
  </div>

  <div class="row" style="margin-top:10px">
    <span class="label">Predopozorilo:</span>
    <button class="leadBtn" data-m="50">50 m</button>
    <button class="leadBtn" data-m="100">100 m</button>
    <button class="leadBtn active" data-m="200">200 m</button>
  </div>

  <div class="row" style="margin-top:10px">
    <button id="addAlert" class="primary bigAdd">➕ DODAJ</button>
  </div>
</div>

<div class="card">
  <div class="label">Aktivna opozorila</div>
  <div id="alertList" class="log"></div>
</div>

<div class="card">
  <div class="row" style="justify-content:space-between">
    <div class="label">Log</div>
    <label>
      <input id="logToggle" type="checkbox" checked> Log ON
    </label>
  </div>
  <div id="log" class="log"></div>
</div>

<div id="alert" class="alert"><span id="amsg"></span></div>

<script>
let watchId=null,last=null,total=0,measure=false;
let leadM=200,minStep=0.3,maxAcc=30;
let wps=[],wakeLock=null;
const LOG_MAX=20;
let loggingEnabled=true;

const $=id=>document.getElementById(id);
const fmt=x=>(x/1000).toFixed(3);
const ts=()=>new Date().toLocaleTimeString();

function log(msg){
  if(!loggingEnabled) return;
  const box=$('log');
  const lines=(box.textContent?box.textContent.split('\n'):[]);
  lines.push(`[${ts()}] ${msg}`);
  while(lines.length>LOG_MAX) lines.shift();
  box.textContent=lines.join('\n');
  box.scrollTop=box.scrollHeight;
}

function hav(a,b){
  const R=6371000,toRad=d=>d*Math.PI/180;
  let dLat=toRad(b.lat-a.lat),dLon=toRad(b.lon-a.lon);
  let h=Math.sin(dLat/2)**2+
        Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*
        Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function gpsInit(){
  navigator.geolocation.getCurrentPosition(
    p=>log(`GPS pre-warm OK (${Math.round(p.coords.accuracy)} m)`),
    ()=>log(`GPS pre-warm ERR`)
  );

  watchId=navigator.geolocation.watchPosition(p=>{
    const acc=p.coords.accuracy;
    $('acca').textContent=Math.round(acc)+' m';
    $('coords').textContent=
      p.coords.latitude.toFixed(6)+', '+p.coords.longitude.toFixed(6);

    if(acc>maxAcc){
      $('gpss').textContent='Slab signal';
      return;
    }
    $('gpss').textContent='GPS OK';

    const now={lat:p.coords.latitude,lon:p.coords.longitude};
    if(last){
      const d=hav(last,now);
      if(measure && d>=minStep){
        total+=d;
        $('total').textContent=fmt(total);
        checkAlerts();
      }
    }
    last=now;
  },()=>log('GPS ERR'),{enableHighAccuracy:true});
}

function updateNext(){
  let best=Infinity;
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;
    if(d>0 && d<best) best=d;
  }
  $('nextD').textContent=best<Infinity?Math.round(best)+' m':'— m';
}

function checkAlerts(){
  for(const w of wps){
    if(w.passed) continue;
    const d=w.km*1000-total;

    if(!w.pre && d<=w.lead && d>0){
      w.pre=true;
      log('PRE '+w.txt);
    }
    if(!w.alert && d<=0){
      w.alert=true;
      w.passed=true;
      navigator.vibrate?.(250);
      showAlert(w.txt);
      log('ALERT '+w.txt);
    }
    if(d>0) break;
  }
  updateNext();
  renderAlerts();
}

function showAlert(t){
  $('amsg').textContent=t;
  $('alert').style.display='block';
  setTimeout(()=>$('alert').style.display='none',6000);
}

function renderAlerts(){
  const box=$('alertList');
  box.textContent='';
  wps.forEach((w,i)=>{
    if(w.passed) return;
    const d=Math.round(w.km*1000-total);
    const row=document.createElement('div');
    row.innerHTML=
      `${d} m – ${w.txt}
       <button data-i="${i}" class="edit">✏️</button>
       <button data-i="${i}" class="del">🗑</button>`;
    box.appendChild(row);
  });

  box.querySelectorAll('.del').forEach(b=>{
    b.onclick=()=>{
      wps.splice(b.dataset.i,1);
      renderAlerts();
      updateNext();
    };
  });

  box.querySelectorAll('.edit').forEach(b=>{
    b.onclick=()=>{
      const w=wps[b.dataset.i];
      const n=prompt('Nov opis',w.txt);
      if(n!==null){ w.txt=n; renderAlerts(); }
    };
  });
}

$('startBtn').onclick=()=>{
  measure=true;
  $('startBtn').classList.add('active');
  $('stopBtn').classList.remove('warn');
  log('START');
};

$('stopBtn').onclick=()=>{
  measure=false;
  $('stopBtn').classList.add('warn');
  $('startBtn').classList.remove('active');
  log('STOP');
};

$('tm').onclick=()=>{
  total=Math.max(0,total-10);
  $('total').textContent=fmt(total);
  updateNext();
  renderAlerts();
};
$('tp').onclick=()=>{
  total+=10;
  $('total').textContent=fmt(total);
  updateNext();
  renderAlerts();
};

document.querySelectorAll('.leadBtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.leadBtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    leadM=Number(b.dataset.m);
  };
});

$('addAlert').onclick=()=>{
  const d=Number($('alertDist').value);
  if(!d||d<=0) return;
  const txt=$('alertTxt').value||'Opozorilo';
  wps.push({km:(total+d)/1000,txt,lead:leadM,pre:false,alert:false,passed:false});
  wps.sort((a,b)=>a.km-b.km);
  $('alertDist').value='';
  $('alertTxt').value='';
  renderAlerts();
  updateNext();
  log(`ADD ${txt} +${d}m`);
};

$('logToggle').onchange=e=>{
  loggingEnabled=e.target.checked;
  if(!loggingEnabled) $('log').textContent='';
};

$('btnWake').onclick=async()=>{
  try{
    if(!wakeLock){
      wakeLock=await navigator.wakeLock.request('screen');
      $('btnWake').classList.add('info');
      log('Wake‑Lock ON');
    }else{
      await wakeLock.release();
      wakeLock=null;
      $('btnWake').classList.remove('info');
      log('Wake‑Lock OFF');
    }
  }catch{ log('Wake‑Lock ERR'); }
};

gpsInit();
updateNext();
</script>
</body>
</html>
